<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>GéoClassement</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: rgba(255,255,255,0.08);
    --text: #f1f5f9;
    --muted: #64748b;
    --accent: #3b82f6;
    --gold: #f59e0b;
    --green: #22c55e;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ---- HEADER ---- */
  .app-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .app-title span { color: var(--text); }

  /* ---- CATÉGORIE ---- */
  .cat-section { margin-bottom: 28px; }

  .cat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px 20px;
    text-align: center;
    margin-bottom: 12px;
    transition: all .3s;
  }
  .cat-card.empty .cat-icon { font-size: 2.8rem; opacity: .25; }
  .cat-card.filled .cat-icon { font-size: 2.8rem; }
  .cat-card.filled .cat-name {
    font-size: 1.5rem;
    font-weight: 800;
    margin-top: 10px;
    line-height: 1.2;
  }
  .cat-card.empty .placeholder {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 10px;
  }
  .cat-card.filled .cat-desc {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .btn-draw {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: white;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s, transform .1s;
  }
  .btn-draw:active { transform: scale(0.97); opacity: .85; }

  /* ---- SÉPARATEUR ---- */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* ---- RECHERCHE ---- */
  .search-section {}
  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 14px 14px 14px 42px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card);
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* ---- RÉSULTATS ---- */
  .results { display: flex; flex-direction: column; gap: 8px; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .result-card:active { border-color: var(--accent); }

  .result-flag { font-size: 2rem; line-height: 1; flex-shrink: 0; }

  .result-body { flex: 1; min-width: 0; }
  .result-name { font-weight: 700; font-size: 1rem; }
  .result-cat { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .result-value {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--gold);
    text-align: right;
    flex-shrink: 0;
  }

  /* État sans catégorie */
  .no-cat-hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 30px 0;
  }

  /* Aucun résultat */
  .no-result {
    text-align: center;
    color: var(--muted);
    padding: 24px 0;
    font-size: 0.9rem;
  }

  /* ---- MODAL détail ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1e293b;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 48px;
    width: 100%;
    max-width: 480px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } }
  .modal-flag { font-size: 4rem; text-align: center; line-height: 1; margin-bottom: 8px; }
  .modal-name { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 20px; }
  .modal-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row-label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--muted); }
  .modal-row-value { font-weight: 700; font-size: 1rem; }
  .modal-row-value.highlight { color: var(--gold); font-size: 1.2rem; }
  .modal-close {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: rgba(255,255,255,.08);
    color: var(--text);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="app-title">🌍 <span>GéoClassement</span></div>

<!-- SECTION CATÉGORIE -->
<div class="cat-section">
  <div class="section-label">Catégorie en cours</div>
  <div class="cat-card empty" id="cat-card">
    <div class="cat-icon">🎲</div>
    <div class="placeholder">Tire une catégorie pour commencer</div>
  </div>
  <button class="btn-draw" id="btn-draw">🎲 Tirer une catégorie</button>
</div>

<div class="divider"></div>

<!-- SECTION RECHERCHE -->
<div class="search-section">
  <div class="section-label">Rechercher un pays</div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Ex : France, Japon, Brésil…" autocomplete="off">
  </div>

  <div class="results" id="results"></div>
</div>

<!-- MODAL détail pays -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-flag" id="m-flag"></div>
    <div class="modal-name" id="m-name"></div>
    <div id="m-rows"></div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">Fermer</button>

</div>

const CATEGORIES = [
  {key:"pop",    label:"Population",            unit:"hab.",     icon:"👥", fmt:v=>v.toLocaleString("fr-FR")+" hab."},
  {key:"pib",    label:"PIB nominal",           unit:"Md$",      icon:"💰", fmt:v=>v.toLocaleString("fr-FR")+" Md$"},
  {key:"fifa",   label:"Classement FIFA",       unit:"rang",     icon:"⚽", fmt:v=>"#"+v, note:"Plus le rang est bas, meilleure est l'équipe"},
  {key:"alt",    label:"Point culminant",       unit:"m",        icon:"⛰️", fmt:v=>v.toLocaleString("fr-FR")+" m"},
  {key:"cote",   label:"Longueur des côtes",    unit:"km",       icon:"🌊", fmt:v=>v.toLocaleString("fr-FR")+" km"},
  {key:"unesco", label:"Sites UNESCO",          unit:"sites",    icon:"🏛️", fmt:v=>v+" site"+(v>1?"s":"")},
  {key:"surf",   label:"Superficie",            unit:"km²",      icon:"🗺️", fmt:v=>v.toLocaleString("fr-FR")+" km²"},
  {key:"vie",    label:"Espérance de vie",      unit:"ans",      icon:"❤️", fmt:v=>v+" ans"},
  {key:"dens",   label:"Densité de population", unit:"hab/km²",  icon:"🏙️", fmt:v=>v+" hab/km²"},
  {key:"front",  label:"Pays frontaliers",      unit:"voisins",  icon:"🧭", fmt:v=>v+" voisin"+(v>1?"s":"")}
];

/* ========== ÉTAT ========== */
let currentCat = null;

function flag(iso){
  return iso.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65));
}

/* ========== TIRAGE CATÉGORIE ========== */
document.getElementById("btn-draw").addEventListener("click", () => {
  // exclure la catégorie actuelle du tirage
  const pool = currentCat ? CATEGORIES.filter(c => c.key !== currentCat.key) : CATEGORIES;
  currentCat = pool[Math.floor(Math.random() * pool.length)];

  const card = document.getElementById("cat-card");
  card.className = "cat-card filled";
  card.innerHTML = `
    <div class="cat-icon">${currentCat.icon}</div>
    <div class="cat-name">${currentCat.label}</div>
    <div class="cat-desc">${currentCat.note || "Classe les pays du plus petit au plus grand"}</div>
  `;

  // rafraîchir les résultats si une recherche est en cours
  renderResults(document.getElementById("search-input").value.trim());
});

/* ========== RECHERCHE ========== */
document.getElementById("search-input").addEventListener("input", e => {
  renderResults(e.target.value.trim());
});

function normalize(str){
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[-'\s]/g, "");
}

function renderResults(query){
  const el = document.getElementById("results");
  el.innerHTML = "";

  if(!currentCat){
    el.innerHTML = `<div class="no-cat-hint">Tire d'abord une catégorie</div>`;
    return;
  }
  if(query.length < 4){
    return;
  }

  const q = normalize(query);
  const matches = COUNTRIES.filter(c => normalize(c.name).includes(q)).slice(0, 8);

  if(matches.length === 0){
    el.innerHTML = `<div class="no-result">Aucun pays trouvé pour « ${query} »</div>`;
    return;
  }

  matches.forEach(c => {
    const card = document.createElement("div");
    card.className = "result-card";
    card.innerHTML = `
      <div class="result-flag">${flag(c.iso)}</div>
      <div class="result-body">
        <div class="result-name">${c.name}</div>
        <div class="result-cat">${currentCat.icon} ${currentCat.label}</div>
      </div>
      <div class="result-value">${currentCat.fmt(c[currentCat.key])}</div>
    `;
    card.addEventListener("click", () => openModal(c));
    el.appendChild(card);
  });
}

/* ========== MODAL détail ========== */
function openModal(country){
  document.getElementById("m-flag").textContent = flag(country.iso);
  document.getElementById("m-name").textContent = country.name;

  const rows = document.getElementById("m-rows");
  rows.innerHTML = "";

  CATEGORIES.forEach(cat => {
    const isActive = currentCat && cat.key === currentCat.key;
    const row = document.createElement("div");
    row.className = "modal-row";
    row.innerHTML = `
      <div class="modal-row-label">${cat.icon} ${cat.label}</div>
      <div class="modal-row-value${isActive ? " highlight" : ""}">${cat.fmt(country[cat.key])}</div>
    `;
    rows.appendChild(row);
  });

  document.getElementById("modal").classList.add("open");
}

function closeModal(e){
  if(e.target === document.getElementById("modal"))
    document.getElementById("modal").classList.remove("open");
}
</script>
</body>
</html>
